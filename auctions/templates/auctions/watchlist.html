{% extends "auctions/layout.html" %}

{% block body %}
<h4 class="mt-3">Your Watchlist</h4>

<div class="row row-cols-1 row-cols-md-4 g-4 mt-2">
    {% for listing in listings %}
        <div class="col">
            <div class="card">
                <img src="{{ listing.image }}" class="card-img-top">

                <div class="card-body">
                    <h5>{{ listing.title }}</h5>
                    <p>{{ listing.description|truncatewords:12 }}</p>

                    <a href="{% url 'detail' listing.id %}" class="btn btn-primary">
                        View Listing
                    </a>
                </div>
            </div>
        </div>
    {% empty %}
        <p>No items in your watchlist.</p>
    {% endfor %}
</div>

{% endblock %}
